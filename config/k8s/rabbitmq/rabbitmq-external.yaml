# On-Prem GPU Worker → EKS RabbitMQ (NodePort)
# wake 후 Argo/kubectl 로 항상 재생성. nodePort 고정: 31624
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-external
  namespace: forenshield
  labels:
    app: rabbitmq-external
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      nodePort: 31624
