apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: forenshield
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      nodeSelector:
        nodegroup: frontend-ng
      containers:
        # ---- Nginx 사이드카 ----
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
        # ---- Next.js ----
        - name: nextjs
          image: 877044078824.dkr.ecr.ap-northeast-2.amazonaws.com/forenshield-frontend:develop-bd4d3868fbceb8d3956bd4eea89638e351d020f5
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # K8s가 HOSTNAME=Pod이름으로 설정 → Next.js standalone이 거기 바인딩되어
            # nginx(127.0.0.1:3000) 프록시가 502 남. 모든 인터페이스에 바인딩하도록 고정
            - name: HOSTNAME
              value: "0.0.0.0"
          envFrom:
            - configMapRef:
                name: frontend-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config