apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: forenshield
data:
  AWS_REGION: ap-northeast-2
  RABBITMQ_HOST: rabbitmq.forenshield.svc.cluster.local
  RABBITMQ_PORT: "5672"
  AI_GATEWAY_URL: http://192.168.0.34:8000
  AI_GATEWAY_TIMEOUT_SEC: "1800"
  AI_CONSUMER_ENABLED: "true"
  ANALYSIS_QUEUE: forenshield.analysis.queue
  AI_RESULT_EXCHANGE: ai.result.exchange
  AI_RESULT_ROUTING_KEY: result.video
  SPRING_PROFILES_ACTIVE: prod
  # dev 스키마 변경이 잦은 동안 Hibernate가 테이블을 자동 생성/수정하도록 함
  # 스키마가 안정되면 validate로 되돌릴 것
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SERVER_PORT: "8080"
  REDIS_PORT: "6379"
  REDIS_SSL: "true"
  ANALYSIS_WORKER_MODE: ai
  # 블록체인 — Fabric Gateway on EC2 (forenshield-fabric-poc 10.0.10.224)
  BLOCKCHAIN_ANCHOR_ENABLED: "true"
  BLOCKCHAIN_ANCHOR_MODE: "http"
  BLOCKCHAIN_ANCHOR_URL: "http://10.0.10.224:8088/api/v1/anchor"
  BLOCKCHAIN_ANCHOR_NETWORK: "hyperledger-fabric-forenshield"
  # 영상 화질 readiness — 프레임 샘플링 (video_readiness.py)
  # 경로·실행 파일명은 비밀이 아니므로 ConfigMap 사용 (Secret 불필요).
  # backend 이미지에 python3 + opencv/numpy + 아래 경로의 스크립트가 있어야 FRAME_SAMPLE 동작.
  READINESS_FRAME_CHECK_ENABLED: "true"
  READINESS_PYTHON: "python3"
  READINESS_SCRIPT_PATH: "/app/readiness/video_readiness.py"
  READINESS_SAMPLE_EVERY: "10"
  READINESS_PROCESS_TIMEOUT_SEC: "180"
