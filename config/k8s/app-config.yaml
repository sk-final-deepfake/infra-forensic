apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: forenshield
data:
  AWS_REGION: ap-northeast-2
  RABBITMQ_HOST: rabbitmq.forenshield.svc.cluster.local
  RABBITMQ_PORT: "5672"
  AI_GATEWAY_URL: http://192.168.0.112:8000
  AI_GATEWAY_TIMEOUT_SEC: "1800"
  AI_CONSUMER_ENABLED: "true"
  ANALYSIS_QUEUE: forenshield.analysis.queue
  AI_RESULT_EXCHANGE: ai.result.exchange
  AI_RESULT_ROUTING_KEY: result.video
  SPRING_PROFILES_ACTIVE: prod
  # dev 스키마 변경이 잦은 동안 Hibernate가 테이블을 자동 생성/수정하도록 함
  # 스키마가 안정되면 validate로 되돌릴 것
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SERVER_PORT: "8080"
  REDIS_PORT: "6379"
  REDIS_SSL: "true"
  ANALYSIS_WORKER_MODE: ai
  # 블록체인 — Fabric Gateway on EC2 (forenshield-fabric-poc 10.0.10.224)
  BLOCKCHAIN_ANCHOR_ENABLED: "true"
  BLOCKCHAIN_ANCHOR_MODE: "http"
  BLOCKCHAIN_ANCHOR_URL: "http://10.0.10.224:8088/api/v1/anchor"
  BLOCKCHAIN_ANCHOR_NETWORK: "hyperledger-fabric-forenshield"
