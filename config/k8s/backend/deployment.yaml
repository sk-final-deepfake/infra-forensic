apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: forenshield
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: forenshield-app   # S3 IRSA — 2번에서 이미 생성됨
      nodeSelector:
        nodegroup: backend-ng
      containers:
        - name: backend
          image: 877044078824.dkr.ecr.ap-northeast-2.amazonaws.com/forenshield-backend:50417ad90aa99060e79b7acaa2cb041c72bea619
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config           # SPRING_PROFILES_ACTIVE=prod 포함
            - secretRef:
                name: db-credentials
            - secretRef:
                name: redis-credentials
            - secretRef:
                name: rabbitmq-credentials
            - secretRef:
                name: s3-config
            - secretRef:
                name: app-secrets          # JWT_SECRET_KEY + MANIFEST_SIGNING_*_PEM (terraform secrets.tfvars)
          # manifest-signing-credentials 별도 Secret 쓰지 말 것 — park 시 사라지고 CreateContainerConfigError
          # Spring Boot + Hibernate(ddl update) 기동에 40~60초 소요 → startupProbe로 대기
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18   # 최대 ~3분까지 기동 허용
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
