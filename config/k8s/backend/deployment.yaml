apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: forenshield
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: forenshield-app   # S3 IRSA — 2번에서 이미 생성됨
      nodeSelector:
        nodegroup: backend-ng
      containers:
        - name: backend
          image: 877044078824.dkr.ecr.ap-northeast-2.amazonaws.com/forenshield-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config           # SPRING_PROFILES_ACTIVE=prod 포함
            - secretRef:
                name: db-credentials
            - secretRef:
                name: redis-credentials
            - secretRef:
                name: rabbitmq-credentials
            - secretRef:
                name: s3-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi