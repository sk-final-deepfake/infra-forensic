apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forenshield
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sk-final-deepfake/infra-forensic.git
    targetRevision: master
    # 저장소 루트 기준, k8s 매니페스트가 있는 경로
    path: config/k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: forenshield
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
